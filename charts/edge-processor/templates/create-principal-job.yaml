apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "edge-processor.fullname" . }}-generate-principal-job
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "edge-processor.serviceAccountName" . }}-principal-job
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: generate-principal-yaml
          image: "{{ include "edge-processor.image" . }}"
          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "edge-processor.fullname" . }}-config
                  key: env
            - name: REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "edge-processor.fullname" . }}-config
                  key: region
            - name: TENANT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "edge-processor.fullname" . }}-config
                  key: tenant
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "edge-processor.fullname" . }}-secret
                  key: token
            - name: COMPLIANCE_TYPE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "edge-processor.fullname" . }}-config
                  key: complianceType
            - name: USE_FIPS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "edge-processor.fullname" . }}-config
                  key: useFips
            {{- if .Values.config.GODEBUG }}
            - name: GODEBUG
              value: {{ .Values.config.GODEBUG | quote }}
            {{- end }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              TMP_DIR=$(mktemp -d)
              PRINCIPAL_YAML_FILE="${TMP_DIR}/principal.yaml"
              echo "Generating principal.yaml..."
              eptools setup > ${PRINCIPAL_YAML_FILE}

              echo "Creating secret..."
              kubectl delete secret {{ include "edge-processor.secretName" . }} --ignore-not-found=true &&
              kubectl create secret generic {{ include "edge-processor.secretName" . }} \
                --from-file=${PRINCIPAL_YAML_FILE}

              echo "Secret '{{ include "edge-processor.secretName" . }}' created/updated."
