{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "edge-processor.fullname" . }}-principal-job
  labels:
    {{- include "edge-processor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "edge-processor.fullname" . }}-principal-job
subjects:
  - kind: ServiceAccount
    name: {{ include "edge-processor.serviceAccountName" . }}-principal-job
    namespace: {{ .Release.Namespace }}
{{- end }}