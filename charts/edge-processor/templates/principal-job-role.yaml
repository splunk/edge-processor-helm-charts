{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "edge-processor.fullname" . }}-principal-job
  labels:
    {{- include "edge-processor.labels" . | nindent 4 }}
rules:
  # Allow reading and writing secrets for credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Allow managing own pod information
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Allow pod exec for lifecycle hooks
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
{{- end }}

